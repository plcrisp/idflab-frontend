<div class="container">
  <main>
    <router-outlet></router-outlet>

    <div
      style="border: 2px solid red; padding: 20px; margin: 20px; background: #f9f9f9; color: black"
    >
      <h3>🧪 Laboratório de Testes (Auth)</h3>

      <p><strong>Passo 1:</strong></p>
      <button (click)="testarRegistro()" style="padding: 10px">Registrar Usuário</button>

      <p><strong>Passo 2:</strong> Teste o bloqueio (deve falhar com 403)</p>
      <button (click)="testarLogin()" style="padding: 10px">Tentar Logar</button>

      <hr />
      <p><strong>Passo 3:</strong> Vá no seu e-mail, copie APENAS O TOKEN da URL e cole aqui:</p>
      <input
        type="text"
        [(ngModel)]="tokenTeste"
        placeholder="Cole o eyJhbGciOiJIUz..."
        style="width: 100%; padding: 10px; margin-bottom: 10px"
      />
      <button (click)="testarVerificacao()" style="padding: 10px; background: lightgreen">
        Verificar E-mail
      </button>
      <hr />

      <p><strong>Passo 4:</strong> Teste o login novamente (agora deve passar)</p>
      <button (click)="testarLogin()" style="padding: 10px">Tentar Logar Novamente</button>
    </div>
  </main>
</div>
