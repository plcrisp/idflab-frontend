<div class="form-wrapper">
  <form *ngIf="!success" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div class="form-header">
      <h1>Recuperar senha</h1>
      <p class="subtitle">Informe a nova credencial e obtenha acesso ao sistema novamente.</p>
    </div>

    <div class="input-group">
      <label for="password">Senha</label>
      <input
        type="password"
        id="password"
        formControlName="password"
        autocomplete="new-password"
        [class.invalid]="resetForm.get('password')?.invalid && resetForm.get('password')?.touched"
      />
      <p
        class="error-text"
        *ngIf="resetForm.get('password')?.hasError('minlength') && resetForm.get('password')?.touched"
      >
        A senha deve ter pelo menos 8 caracteres.
      </p>
    </div>

    <div class="input-group">
      <label for="confirm_password">Confirmar senha</label>
      <input
        type="password"
        id="confirm_password"
        formControlName="confirm_password"
        autocomplete="new-password"
        [class.invalid]="resetForm.hasError('passwordMismatch') && resetForm.get('confirm_password')?.touched"
      />

      <p
        class="error-text"
        *ngIf="resetForm.hasError('passwordMismatch') && resetForm.get('confirm_password')?.touched"
      >
        As senhas não coincidem.
      </p>

      <p class="error-text" *ngIf="errorMessage && !(resetForm.hasError('passwordMismatch'))">
        {{ errorMessage }}
      </p>
    </div>

    <div class="actions">
      <button type="submit" class="btn-primary" [disabled]="resetForm.invalid">
        Alterar senha
      </button>
    </div>

    <div class="toggle-view">
      <p>
        Voltar ao
        <a routerLink="/auth/login">Login</a>
      </p>
    </div>
  </form>

  <div *ngIf="success" class="success-state">
    <div class="icon-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>

    <h2>Senha alterada com sucesso!</h2>
    <p>Retorne ao Login para completar sua ação com a nova credencial.</p>

    <div class="success-actions">
      <button routerLink="/auth/login" class="btn-primary">Ir para o Login</button>
    </div>
  </div>
</div>
